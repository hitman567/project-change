<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Change | 60-Day Transformation Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a12;--bg2:#13132a;--bg3:#1e1e3a;--accent:#7c5cfc;--accent2:#a78bfa;--green:#10b981;--yellow:#f59e0b;--red:#ef4444;--blue:#3b82f6;--pink:#ec4899;--cyan:#06b6d4;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--border:rgba(255,255,255,0.06);--r:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent2);text-decoration:none}a:hover{text-decoration:underline}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}
button,input,select,textarea{font-family:inherit}

.header{background:var(--bg2);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.logo{font-size:1.3rem;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--pink),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-right{display:flex;align-items:center;gap:10px}
.badges{display:flex;gap:8px}.badge{padding:4px 12px;border-radius:16px;font-weight:700;font-size:.75rem}
.b-day{background:var(--accent);color:#fff}.b-str{background:var(--green);color:#000}

.uavt{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 11px 4px 4px;cursor:pointer;color:var(--text);font-size:.78rem;font-weight:600;transition:border-color .12s;border:none}
.uavt:hover{border:1px solid var(--accent)!important}
.u-av{width:24px;height:24px;border-radius:50%;object-fit:cover;background:var(--accent);display:block}
.u-init{width:24px;height:24px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:.65rem;color:#fff;font-weight:700;flex-shrink:0}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg2);border-radius:var(--r);padding:22px;max-width:380px;width:calc(100% - 32px);border:1px solid var(--border)}
.modal-title{font-size:1rem;font-weight:700;margin-bottom:14px;color:var(--accent2)}
.urow{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:all .12s;margin-bottom:5px}
.urow:hover{border-color:var(--accent);background:var(--bg3)}
.urow.active{border-color:var(--green)}
.urow-av{width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0}
.urow-init{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:.8rem;color:#fff;font-weight:700;flex-shrink:0}

.nav{display:flex;gap:2px;padding:8px 24px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto}
.nav button{padding:8px 16px;border:none;background:none;color:var(--text2);cursor:pointer;border-radius:8px;font-size:.82rem;white-space:nowrap;transition:all .15s}
.nav button:hover{background:var(--bg3);color:var(--text)}
.nav button.on{background:var(--accent);color:#fff}

.wrap{max-width:1340px;margin:0 auto;padding:20px 24px 60px}

.card{background:var(--bg2);border-radius:var(--r);padding:20px;margin-bottom:12px;border:1px solid var(--border)}
.ct{font-size:1.1rem;font-weight:700;margin-bottom:12px;color:var(--accent2)}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:800px){.g2,.g3,.g4{grid-template-columns:1fr}}

.stat{background:var(--bg3);border-radius:var(--r);padding:16px;text-align:center}
.stat .v{font-size:1.8rem;font-weight:800}.stat .l{font-size:.72rem;color:var(--text2);margin-top:2px}

.pbar{background:var(--bg);border-radius:6px;height:7px;overflow:hidden;margin-top:5px}
.pfill{height:100%;border-radius:6px;transition:width .3s}

.sched{display:flex;gap:12px;padding:11px 13px;border-radius:8px;margin-bottom:6px;align-items:flex-start;border-left:3px solid var(--accent);background:rgba(124,92,252,.03)}
.sched .tm{font-size:.8rem;color:var(--accent2);font-weight:700;min-width:100px;padding-top:1px}
.sched .dt h4{font-size:.88rem;margin-bottom:2px}.sched .dt p{font-size:.78rem;color:var(--text2)}

.wtabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.wtab{padding:6px 13px;border:1px solid var(--bg3);background:none;color:var(--text2);border-radius:7px;cursor:pointer;font-size:.8rem;transition:all .15s}
.wtab:hover{border-color:var(--accent)}.wtab.on{background:var(--accent);border-color:var(--accent);color:#fff}

.ti{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:7px;margin-bottom:4px;cursor:pointer;transition:background .12s;border:1px solid transparent}
.ti:hover{background:var(--bg3);border-color:var(--border)}
.ti input[type=checkbox]{width:16px;height:16px;accent-color:var(--green);cursor:pointer;flex-shrink:0}
.ti .tn{flex:1;font-size:.85rem}.ti .tt{font-size:.66rem;padding:2px 6px;border-radius:3px;font-weight:700}
.te{background:rgba(16,185,129,.12);color:var(--green)}.tm2{background:rgba(245,158,11,.12);color:var(--yellow)}
.th{background:rgba(239,68,68,.12);color:var(--red)}.tth{background:rgba(59,130,246,.12);color:var(--blue)}
.tp{background:rgba(124,92,252,.12);color:var(--accent2)}

.ri{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:7px;margin-bottom:4px}
.ri .ic{font-size:1.1rem;flex-shrink:0}.ri .inf{flex:1}.ri .tl{font-size:.85rem}.ri .ds{font-size:.72rem;color:var(--text2)}

.qc{background:var(--bg);border-radius:var(--r);padding:18px;margin-bottom:12px}
.qc .qq{font-size:.92rem;margin-bottom:12px;font-weight:600;line-height:1.4}
.qo{display:block;width:100%;text-align:left;padding:10px 13px;margin-bottom:5px;background:var(--bg2);border:1px solid var(--bg3);border-radius:7px;cursor:pointer;transition:all .12s;font-size:.84rem;color:var(--text)}
.qo:hover{border-color:var(--accent)}.qo.sel{border-color:var(--accent);background:rgba(124,92,252,.1)}
.qo.ok{border-color:var(--green);background:rgba(16,185,129,.1)}.qo.no{border-color:var(--red);background:rgba(239,68,68,.1)}

.pb{background:linear-gradient(135deg,rgba(124,92,252,.07),rgba(236,72,153,.07));border:1px solid rgba(124,92,252,.2);border-radius:var(--r);padding:16px;margin-top:10px}
.pb h4{color:var(--accent2);margin-bottom:5px;font-size:.85rem}
.pb pre{background:var(--bg);padding:10px;border-radius:7px;font-size:.76rem;overflow-x:auto;color:var(--text2);white-space:pre-wrap;line-height:1.4;position:relative}
.cpb{position:absolute;top:5px;right:5px;background:var(--bg3);border:none;color:var(--text2);padding:3px 9px;border-radius:4px;cursor:pointer;font-size:.7rem}
.cpb:hover{background:var(--accent);color:#fff}

.rc{background:var(--bg3);border-radius:var(--r);padding:16px;margin-bottom:8px;border-left:3px solid var(--accent)}
.rc h4{color:var(--accent2);margin-bottom:6px;font-size:.88rem}
.rc ul{list-style:none}.rc li{padding:4px 0;font-size:.82rem;color:var(--text2);border-bottom:1px solid rgba(255,255,255,.02)}

.pc{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg);border-radius:var(--r);text-decoration:none;color:var(--text);transition:background .12s}
.pc:hover{background:var(--bg3);text-decoration:none}
.pc .av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;flex-shrink:0}

.hm{display:grid;grid-template-columns:repeat(10,1fr);gap:2px;max-width:380px}
.hc{aspect-ratio:1;border-radius:2px;background:var(--bg);transition:opacity .1s}
.hc[data-hd]{cursor:pointer}.hc[data-hd]:hover{opacity:.65}
.h1{background:rgba(16,185,129,.2)}.h2{background:rgba(16,185,129,.4)}.h3{background:rgba(16,185,129,.6)}.h4{background:rgba(16,185,129,.85)}

.ja{width:100%;min-height:100px;background:var(--bg);border:1px solid var(--bg3);border-radius:7px;padding:12px;color:var(--text);font-size:.85rem;resize:vertical;line-height:1.4}
.ja:focus{outline:none;border-color:var(--accent)}

.btn{padding:8px 16px;border:none;border-radius:7px;cursor:pointer;font-size:.82rem;font-weight:600;transition:all .12s}
.bp{background:var(--accent);color:#fff}.bp:hover{background:var(--accent2)}
.bg{background:var(--green);color:#000}.bo{background:none;border:1px solid var(--bg3);color:var(--text2)}.bo:hover{border-color:var(--accent);color:var(--accent2)}
.bs{padding:5px 11px;font-size:.76rem}

.inp{padding:8px 12px;background:var(--bg);border:1px solid var(--bg3);border-radius:7px;color:var(--text);font-size:.83rem}
.inp:focus{outline:none;border-color:var(--accent)}

.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#000;padding:9px 20px;border-radius:7px;font-weight:700;font-size:.82rem;z-index:999;transform:translateY(70px);opacity:0;transition:all .2s;pointer-events:none}
.toast.vis{transform:translateY(0);opacity:1}
</style>
</head>
<body>

<header class="header">
  <div class="logo">Project Change</div>
  <div class="hdr-right">
    <div class="badges">
      <span class="badge b-day" id="bDay">Day 1/60</span>
      <span class="badge b-str" id="bStr">0 streak</span>
    </div>
    <button class="uavt" id="uBtn" style="display:none" title="Switch profile"></button>
  </div>
</header>

<nav class="nav" id="nav" style="display:none"></nav>
<main class="wrap" id="main"></main>
<div class="toast" id="toast"></div>

<script>
(function() {
  "use strict";

  // ── User management ──────────────────────────────────────────
  var ACTIVE_KEY = "pc_active_user";
  var USERS_KEY  = "pc_users";
  var LEGACY_KEY = "pc_v3";

  function getUserKey(u) { return "pc_v3_" + u; }
  function getUsers() { try { return JSON.parse(localStorage.getItem(USERS_KEY)) || []; } catch(e) { return []; } }
  function addUserToList(u) { var list = getUsers(); if (list.indexOf(u) === -1) { list.push(u); localStorage.setItem(USERS_KEY, JSON.stringify(list)); } }

  var activeUser = localStorage.getItem(ACTIVE_KEY) || "";

  // ── Data defaults ─────────────────────────────────────────────
  var DEF = {startDate:"2026-05-07",done:{},daily:{},lc:[],recap:[],journals:{},projects:[],custom:{},stats:{lc:0,gh:0,hf:0},streak:0,last:null,heat:{}};
  var D;

  function loadData() {
    var k;
    if (activeUser) {
      k = getUserKey(activeUser);
      // one-time migration of legacy data for the first user to log in
      if (!localStorage.getItem(k)) {
        var legacy = localStorage.getItem(LEGACY_KEY);
        if (legacy) localStorage.setItem(k, legacy);
      }
    } else {
      k = LEGACY_KEY;
    }
    try { D = JSON.parse(localStorage.getItem(k)); if (!D) throw 0; D = Object.assign({}, DEF, D); }
    catch(e) { D = Object.assign({}, DEF); }
  }

  function save() {
    var k = activeUser ? getUserKey(activeUser) : LEGACY_KEY;
    localStorage.setItem(k, JSON.stringify(D));
  }

  loadData();

  // ── Helpers ───────────────────────────────────────────────────
  function $(id) { return document.getElementById(id); }
  function today() { return new Date().toISOString().split("T")[0]; }
  function dayNum() { var s = new Date(D.startDate+"T00:00:00"), n = new Date(); return Math.max(1, Math.min(60, Math.floor((n-s)/864e5)+1)); }
  function weekNum() { return Math.min(8, Math.ceil(dayNum()/7.5)); }
  function toast(m, color) { var t = $("toast"); t.textContent = m; t.style.background = color || "var(--green)"; t.style.color = color ? "#fff" : "#000"; t.classList.add("vis"); setTimeout(function(){t.classList.remove("vis")}, 2200); }
  function recAct() { var k = today(); D.heat[k] = (D.heat[k]||0)+1; save(); }
  function pct(a,b) { return b ? Math.round(a/b*100) : 0; }
  function tc(tag) { return tag==="easy"?"te":tag==="medium"?"tm2":tag==="hard"?"th":tag==="theory"?"tth":"tp"; }
  function esc(s) { return s.replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  // ── User display ──────────────────────────────────────────────
  function updateUserDisplay() {
    var btn = $("uBtn");
    if (!activeUser) { btn.style.display = "none"; return; }
    btn.style.display = "flex";
    btn.style.alignItems = "center";
    btn.style.gap = "7px";
    btn.style.background = "var(--bg3)";
    btn.style.borderRadius = "20px";
    btn.style.padding = "4px 11px 4px 4px";
    btn.style.border = "1px solid var(--border)";
    btn.style.cursor = "pointer";
    btn.style.fontSize = ".78rem";
    btn.style.fontWeight = "600";
    btn.style.color = "var(--text)";

    var initials = activeUser.charAt(0).toUpperCase();
    var img = document.createElement("img");
    img.className = "u-av";
    img.src = "https://github.com/" + activeUser + ".png?size=24";
    img.onerror = function() {
      img.parentNode.replaceChild(
        Object.assign(document.createElement("div"), {className:"u-init", textContent: initials}),
        img
      );
    };
    btn.innerHTML = "";
    btn.appendChild(img);
    var span = document.createElement("span");
    span.textContent = activeUser;
    btn.appendChild(span);
  }

  function showProfileModal() {
    var users = getUsers();
    var ov = document.createElement("div");
    ov.className = "overlay";
    var h = '<div class="modal"><div class="modal-title">Switch Profile</div>';
    users.forEach(function(u) {
      h += '<div class="urow' + (u === activeUser ? " active" : "") + '" data-su="' + u + '">';
      h += '<img src="https://github.com/' + u + '.png?size=32" class="urow-av" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">';
      h += '<div class="urow-init" style="display:none">' + u.charAt(0).toUpperCase() + '</div>';
      h += '<div style="flex:1"><div style="font-size:.88rem;font-weight:600">' + u + '</div>' + (u === activeUser ? '<div style="font-size:.72rem;color:var(--green)">Active</div>' : '') + '</div>';
      if (u === activeUser) h += '<span style="color:var(--green);font-size:.8rem">✓</span>';
      h += '</div>';
    });
    h += '<div style="border-top:1px solid var(--border);margin:12px 0 10px"></div>';
    h += '<div style="display:flex;gap:6px"><input class="inp" id="newUInp" placeholder="Add GitHub username" style="flex:1"><button class="btn bp bs" id="newUBtn">Add</button></div>';
    h += '<button class="btn bo" id="logoutBtn" style="margin-top:8px;width:100%;border-color:var(--red);color:var(--red)">Log Out</button>';
    h += '<button class="btn bo" id="closeModal" style="margin-top:5px;width:100%">Cancel</button>';
    h += '</div>';
    ov.innerHTML = h;
    document.body.appendChild(ov);

    ov.querySelectorAll("[data-su]").forEach(function(el) {
      el.addEventListener("click", function() {
        var u = el.getAttribute("data-su");
        if (u !== activeUser) { activeUser = u; localStorage.setItem(ACTIVE_KEY, u); loadData(); updateUserDisplay(); render(); }
        document.body.removeChild(ov);
      });
    });
    $("newUBtn").addEventListener("click", function() {
      var u = $("newUInp").value.trim().toLowerCase();
      if (!u || !/^[a-z0-9_-]+$/i.test(u)) return;
      activeUser = u; localStorage.setItem(ACTIVE_KEY, u); addUserToList(u); loadData(); updateUserDisplay();
      document.body.removeChild(ov); render();
    });
    $("newUInp").addEventListener("keydown", function(e) { if (e.key === "Enter") $("newUBtn").click(); });
    $("logoutBtn").addEventListener("click", function() {
      activeUser = ""; localStorage.removeItem(ACTIVE_KEY);
      $("nav").style.display = "none"; updateUserDisplay();
      document.body.removeChild(ov); render();
    });
    $("closeModal").addEventListener("click", function() { document.body.removeChild(ov); });
    ov.addEventListener("click", function(e) { if (e.target === ov) document.body.removeChild(ov); });
  }

  // ── Login screen ──────────────────────────────────────────────
  function renderLogin() {
    $("nav").style.display = "none";
    $("uBtn").style.display = "none";
    var users = getUsers();
    var h = '<div style="max-width:420px;margin:60px auto"><div class="card" style="padding:28px">';
    h += '<div style="font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px">Project Change</div>';
    h += '<p style="color:var(--text2);font-size:.84rem;margin-bottom:22px">60-Day MAANG + AI/ML Transformation Tracker</p>';
    if (users.length) {
      h += '<div style="font-size:.72rem;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Continue as</div>';
      users.forEach(function(u) {
        h += '<div class="urow" data-login-user="' + u + '">';
        h += '<img src="https://github.com/' + u + '.png?size=32" class="urow-av" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">';
        h += '<div class="urow-init" style="display:none">' + u.charAt(0).toUpperCase() + '</div>';
        h += '<span style="font-size:.9rem;font-weight:600">' + u + '</span></div>';
      });
      h += '<div style="border-top:1px solid var(--border);margin:16px 0 14px"></div>';
      h += '<div style="font-size:.72rem;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">New profile</div>';
    } else {
      h += '<div style="font-size:.82rem;color:var(--text2);margin-bottom:10px">Enter your GitHub username to start tracking</div>';
    }
    h += '<div style="display:flex;gap:8px"><input class="inp" id="loginInp" placeholder="GitHub username (e.g. hitman567)" style="flex:1"><button class="btn bp" id="loginBtn">Start</button></div>';
    h += '<p id="loginErr" style="color:var(--red);font-size:.76rem;margin-top:8px;min-height:18px"></p>';
    h += '</div></div>';
    $("main").innerHTML = h;

    document.querySelectorAll("[data-login-user]").forEach(function(el) {
      el.addEventListener("click", function() { doLogin(el.getAttribute("data-login-user")); });
    });
    $("loginBtn").addEventListener("click", function() {
      var u = ($("loginInp").value || "").trim().toLowerCase();
      if (!u) { $("loginErr").textContent = "Please enter a username."; return; }
      if (!/^[a-z0-9_-]+$/i.test(u)) { $("loginErr").textContent = "Invalid GitHub username."; return; }
      doLogin(u);
    });
    $("loginInp").addEventListener("keydown", function(e) { if (e.key === "Enter") $("loginBtn").click(); });
  }

  function doLogin(username) {
    activeUser = username.toLowerCase();
    localStorage.setItem(ACTIVE_KEY, activeUser);
    addUserToList(activeUser);
    loadData();
    updateUserDisplay();
    $("nav").style.display = "";
    render();
  }

  // ── Reset helpers ─────────────────────────────────────────────
  function resetDay(date) {
    delete D.heat[date];
    delete D.daily[date];
    delete D.custom[date];
    delete D.journals[date];
    save();
  }

  // ── Curriculum data ───────────────────────────────────────────
  var CUR = [
    {w:1,t:"Foundation: Arrays, Strings & ML Setup",dsa:["Two Sum, Valid Anagram, Contains Duplicate|easy","Best Time to Buy & Sell Stock|easy","Two Pointers: Valid Palindrome, 3Sum|medium","Sliding Window: Max Subarray, Min Window Substring|medium","HashMap: Group Anagrams, Top K Frequent|medium"],sd:["Scalability: vertical vs horizontal|theory","Load balancing strategies|theory","Caching: Redis, Memcached, invalidation|theory","Database: SQL vs NoSQL trade-offs|theory"],ai:["Setup: Python ML env, HuggingFace, keys|project","Transformers: pipelines, tokenizers|theory","Inference with Llama, Mistral|project","Prompt engineering with Claude API|theory"],pj:{n:"FastAPI Learning Tracker API",d:"Backend with FastAPI + SQLite",tk:"Python, FastAPI, Pydantic, SQLite"}},
    {w:2,t:"Stack, Queue, Linked Lists & API Design",dsa:["Stack: Valid Parentheses, Min Stack|medium","Queue using Stacks|easy","LinkedList: Reverse, Merge, Cycle|medium","LinkedList: Remove Nth, Reorder|medium","Largest Rectangle in Histogram|hard"],sd:["REST API design best practices|theory","Design URL Shortener|medium","Rate Limiting: token bucket|theory","CDN and DNS fundamentals|theory"],ai:["Embeddings: sentence-transformers|theory","Vector DBs: ChromaDB, FAISS|project","RAG fundamentals|theory","Build RAG with open-source LLM|project"],pj:{n:"RAG-Powered Doc Q&A",d:"Document Q&A with OS embeddings + LLM",tk:"Python, FastAPI, ChromaDB, HuggingFace"}},
    {w:3,t:"Trees, Graphs & Distributed Systems",dsa:["Binary Tree traversals|easy","BST: Validate, Kth Smallest, LCA|medium","Tree: Max Depth, Same Tree|easy","Graph: BFS, DFS, Islands|medium","Graph: Clone, Course Schedule|medium"],sd:["Consistent hashing|theory","Design Notification System|medium","Kafka, RabbitMQ patterns|theory","Microservices vs Monolith|theory"],ai:["Fine-tuning: LoRA, QLoRA|project","Dataset prep for fine-tuning|theory","Eval: perplexity, BLEU, ROUGE|theory","Deploy on HuggingFace Spaces|project"],pj:{n:"AI Code Review Bot",d:"GitHub code review with fine-tuned model",tk:"Python, FastAPI, GitHub API, LoRA"}},

    qs.forEach(function(q, i) {
      h += '<div class="qc" id="q' + i + '"><div class="qq">' + (i+1) + '. ' + q.q + '</div>';
      q.o.forEach(function(o, j) { h += '<button class="qo" data-qi="' + i + '" data-oi="' + j + '">' + String.fromCharCode(65+j) + ') ' + o + '</button>'; });
      h += '</div>';
    });
    h += '<button class="btn bp" id="qSub">Submit</button>';
    $("qA").innerHTML = h;
    $("qS").innerHTML = "";
    document.querySelectorAll("#qA .qo").forEach(function(b) {
      b.addEventListener("click", function() {
        var qi = b.getAttribute("data-qi"), oi = parseInt(b.getAttribute("data-oi"));
        qAns[qi] = oi;
        document.querySelectorAll("#q" + qi + " .qo").forEach(function(x, k) { x.className = "qo" + (k === oi ? " sel" : ""); });
      });
    });
    $("qSub").addEventListener("click", function() {
      var score = 0;
      for (var i = 0; i < qs.length; i++) {
        var opts = document.querySelectorAll("#q" + i + " .qo");
        for (var j = 0; j < opts.length; j++) { opts[j].className = "qo" + (j === qCor[i] ? " ok" : "") + (j === qAns[i] && j !== qCor[i] ? " no" : ""); }
        if (qAns[i] === qCor[i]) score++;
      }
      var p = Math.round(score / qs.length * 100);
      $("qS").innerHTML = '<div class="stat" style="margin-top:12px"><div class="v" style="color:' + (p >= 80 ? "var(--green)" : p >= 60 ? "var(--yellow)" : "var(--red)") + '">' + score + '/' + qs.length + '</div><div class="l">' + p + '%</div></div>';
      $("qSub").disabled = true; $("qSub").style.opacity = ".4"; recAct();
    });
  }

  // ── Recap ─────────────────────────────────────────────────────
  function pgRecap() {
    var items = D.recap || [];
    var h = '<div class="card"><div class="ct">Morning Recap</div>';
    if (!items.length) { h += '<p style="color:var(--text2);font-size:.82rem">No learnings yet. Add below!</p>'; }
    else {
      var grp = {}; items.forEach(function(it) { if (!grp[it.c]) grp[it.c] = []; grp[it.c].push(it); });
      var names = {dsa:"DSA", sd:"System Design", ai:"AI/ML", project:"Projects", general:"General"};
      Object.keys(grp).forEach(function(c) {
        h += '<div class="rc"><h4>' + (names[c] || c) + '</h4><ul>';
        grp[c].slice(-7).forEach(function(it) { h += '<li><strong>' + it.dt + '</strong>: ' + esc(it.t) + '</li>'; });
        h += '</ul></div>';
      });
    }
    h += '</div><div class="card"><div class="ct">Add Learning</div>';
    h += '<div style="display:flex;gap:6px;flex-wrap:wrap"><select class="inp" id="rC"><option value="dsa">DSA</option><option value="sd">System Design</option><option value="ai">AI/ML</option><option value="project">Project</option><option value="general">General</option></select>';
    h += '<input class="inp" id="rI" placeholder="What did you learn?" style="flex:1;min-width:180px"><button class="btn bg bs" id="rA">Save</button></div></div>';
    return h;
  }
  function bindRecap() {
    $("rA").addEventListener("click", function() { var t = $("rI").value.trim(); if (!t) return; D.recap.push({t: t, c: $("rC").value, dt: today()}); save(); render(); toast("Saved!"); });
    $("rI").addEventListener("keydown", function(e) { if (e.key === "Enter") $("rA").click(); });
  }

  // ── Projects ──────────────────────────────────────────────────
  function pgProjects() {
    var h = '<div class="card"><div class="ct">Projects</div>';
    CUR.forEach(function(w, i) { h += tiHTML("p"+i, "Wk "+(i+1)+": "+w.pj.n+" - "+w.pj.d, "project"); });
    if (D.projects.length) {
      h += '<h4 style="color:var(--green);margin:14px 0 6px;font-size:.88rem">Custom Projects</h4>';
      D.projects.forEach(function(p, i) { h += '<div class="ti" data-pi="' + i + '"><input type="checkbox"' + (p.done ? " checked" : "") + ' tabindex="-1"><span class="tn"><strong>' + esc(p.n) + '</strong> - ' + esc(p.d) + '</span></div>'; });
    }
    h += '</div><div class="card"><div class="ct">Add Project</div>';
    h += '<div style="display:grid;gap:6px"><input class="inp" id="pN" placeholder="Name"><input class="inp" id="pD" placeholder="Description"><input class="inp" id="pT" placeholder="Tech stack"><button class="btn bp bs" id="pA" style="width:fit-content">Add</button></div></div>';
    return h;
  }
  function bindProjects() {
    document.querySelectorAll("#main .ti[data-k]").forEach(function(el) {
      el.addEventListener("click", function() { var k = el.getAttribute("data-k"); D.done[k] = !D.done[k]; if (D.done[k]) recAct(); save(); render(); });
    });
    document.querySelectorAll("[data-pi]").forEach(function(el) {
      el.addEventListener("click", function() { var i = parseInt(el.getAttribute("data-pi")); D.projects[i].done = !D.projects[i].done; save(); render(); });
    });
    $("pA").addEventListener("click", function() { var n = $("pN").value.trim(); if (!n) return; D.projects.push({n: n, d: $("pD").value.trim(), tk: $("pT").value.trim(), done: false}); save(); render(); toast("Added!"); });
  }

  // ── Resources ─────────────────────────────────────────────────
  function pgResources() {
    function ri(ic, t, u, d) { return '<div class="ri"><div class="ic">' + ic + '</div><div class="inf"><div class="tl"><a href="' + u + '" target="_blank">' + t + '</a></div><div class="ds">' + d + '</div></div></div>'; }
    var h = '<div class="g2">';
    h += '<div class="card"><div class="ct">DSA</div>' + ri("📘","NeetCode 150","https://neetcode.io/roadmap","LeetCode by pattern") + ri("📗","Your LeetCode","https://leetcode.com/u/hitman567/","hitman567") + ri("📕","Tech Interview HB","https://www.techinterviewhandbook.org/","Comprehensive guide") + ri("🎥","Striver A2Z","https://www.youtube.com/@takeUforward","Free DSA course") + ri("📙","AlgoMonster","https://algo.monster/","Pattern-based") + '</div>';
    h += '<div class="card"><div class="ct">System Design</div>' + ri("📘","SD Primer","https://github.com/donnemartin/system-design-primer","Definitive repo") + ri("🎥","Jordan Has No Life","https://www.youtube.com/@jordan_has_no_life","Deep walkthroughs") + ri("📗","ByteByteGo","https://bytebytego.com/","Alex Xu") + ri("📕","Grokking SD","https://www.educative.io/courses/grokking-modern-system-design-interview-for-engineers-managers","Interactive") + '</div>';
    h += '<div class="card"><div class="ct">AI/ML + Open Source</div>' + ri("🤗","Your HuggingFace","https://huggingface.co/ayushkt","ayushkt") + ri("📘","HF Courses","https://huggingface.co/learn","NLP, Transformers") + ri("🧠","LLM Course","https://github.com/mlabonne/llm-course","Fine-tune to deploy") + ri("📗","DeepLearning.AI","https://www.deeplearning.ai/short-courses/","RAG, Agents") + ri("🔧","Claude Docs","https://docs.anthropic.com","Tool use, prompts") + '</div>';
    h += '<div class="card"><div class="ct">Python + FastAPI</div>' + ri("🐍","FastAPI","https://fastapi.tiangolo.com/tutorial/","Official guide") + ri("📘","Pydantic V2","https://docs.pydantic.dev/latest/","Validation") + ri("📗","TDD FastAPI","https://testdriven.io/courses/tdd-fastapi/","Production APIs") + ri("🐳","Docker","https://docs.docker.com/get-started/","Containerize") + '</div>';
    h += '</div>';
    return h;
  }

  // ── Profiles ──────────────────────────────────────────────────
  function pgProfiles() {
    var h = '<div class="card"><div class="ct">Profiles</div><div class="g3">';
    h += '<a href="https://leetcode.com/u/hitman567/" target="_blank" class="pc"><div class="av" style="background:#FFA116;color:#000">LC</div><div><h4>LeetCode</h4><p style="font-size:.78rem;color:var(--text2)">hitman567</p></div></a>';
    h += '<a href="https://github.com/hitman567" target="_blank" class="pc"><div class="av" style="background:#333;color:#fff">GH</div><div><h4>GitHub</h4><p style="font-size:.78rem;color:var(--text2)">hitman567</p></div></a>';
    h += '<a href="https://huggingface.co/ayushkt" target="_blank" class="pc"><div class="av" style="background:#FFD21E;color:#000">HF</div><div><h4>HuggingFace</h4><p style="font-size:.78rem;color:var(--text2)">ayushkt</p></div></a>';
    h += '</div></div>';
    h += '<div class="card"><div class="ct">Stats</div><div class="g3">';
    h += '<div><label style="font-size:.76rem;color:var(--text2)">LC Solved</label><input type="number" class="inp" id="sLC" value="' + (D.stats.lc||0) + '" style="width:100%;margin-top:3px"></div>';
    h += '<div><label style="font-size:.76rem;color:var(--text2)">GH Contributions</label><input type="number" class="inp" id="sGH" value="' + (D.stats.gh||0) + '" style="width:100%;margin-top:3px"></div>';
    h += '<div><label style="font-size:.76rem;color:var(--text2)">HF Models</label><input type="number" class="inp" id="sHF" value="' + (D.stats.hf||0) + '" style="width:100%;margin-top:3px"></div>';
    h += '</div><button class="btn bp bs" id="sSv" style="margin-top:10px">Save</button></div>';
    return h;
  }
  function bindProfiles() { $("sSv").addEventListener("click", function() { D.stats = {lc: +$("sLC").value, gh: +$("sGH").value, hf: +$("sHF").value}; save(); toast("Saved!"); }); }

  // ── Journal ───────────────────────────────────────────────────
  function pgJournal() {
    var h = '<div class="card"><div class="ct">Journal</div>';
    h += '<textarea class="ja" id="jT" placeholder="What did you learn? What clicked? What was hard?">' + (D.journals[today()] || "") + '</textarea>';
    h += '<div style="margin-top:8px;display:flex;gap:6px"><button class="btn bp" id="jS">Save</button><button class="btn bo" id="jP">Past Entries</button></div>';
    h += '<div id="jH"></div></div>';
    return h;
  }
  function bindJournal() {
    $("jS").addEventListener("click", function() { var t = $("jT").value.trim(); if (!t) return; D.journals[today()] = t; save(); recAct(); toast("Saved!"); });
    $("jP").addEventListener("click", function() {
      var keys = Object.keys(D.journals).sort().reverse();
      var h = "";
      keys.forEach(function(dt) { h += '<div class="rc" style="margin-top:8px"><h4>' + dt + '</h4><p style="font-size:.82rem;color:var(--text2);white-space:pre-wrap">' + esc(D.journals[dt]) + '</p></div>'; });
      $("jH").innerHTML = h || '<p style="color:var(--text2);font-size:.82rem;margin-top:8px">No entries.</p>';
    });
  }

  // ── Settings ──────────────────────────────────────────────────
  function pgSettings() {
    var h = '<div class="card"><div class="ct">Settings</div>';
    h += '<div style="margin-bottom:16px"><label style="font-size:.8rem;color:var(--text2)">Start Date</label><input type="date" class="inp" id="sD" value="' + D.startDate + '" style="display:block;margin-top:3px"></div>';

    h += '<div style="margin-bottom:20px"><div style="font-size:.9rem;font-weight:700;color:var(--accent2);margin-bottom:6px">Reset Specific Day</div>';
    h += '<p style="font-size:.78rem;color:var(--text2);margin-bottom:10px">Clear all activity (blocks, journal, heatmap) for a chosen date.</p>';
    h += '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">';
    h += '<input type="date" class="inp" id="rdDate" value="' + today() + '">';
    h += '<button class="btn bo" id="rdBtn" style="border-color:var(--yellow);color:var(--yellow)">Reset This Day</button>';
    h += '</div></div>';

    h += '<div style="border-top:1px solid var(--border);padding-top:16px">';
    h += '<div style="font-size:.9rem;font-weight:700;color:var(--accent2);margin-bottom:10px">Data</div>';
    h += '<div style="display:flex;gap:8px;flex-wrap:wrap">';
    h += '<button class="btn bp" id="sEx">Export JSON</button>';
    h += '<button class="btn bo" id="sIm">Import</button><input type="file" id="sIF" accept=".json" style="display:none">';
    h += '<button class="btn bo" id="sR" style="border-color:var(--red);color:var(--red)">Reset All My Data</button>';
    h += '</div></div></div>';
    return h;
  }
  function bindSettings() {
    $("sD").addEventListener("change", function() { D.startDate = $("sD").value; save(); render(); toast("Updated!"); });

    $("rdBtn").addEventListener("click", function() {
      var date = $("rdDate").value;
      if (!date) return;
      if (confirm("Reset all activity for " + date + "?\nThis clears daily blocks, journal, and heatmap for that date.")) {
        resetDay(date);
        toast("Day " + date + " reset", "var(--yellow)");
      }
    });

    $("sEx").addEventListener("click", function() { var b = new Blob([JSON.stringify(D, null, 2)], {type:"application/json"}); var u = URL.createObjectURL(b); var a = document.createElement("a"); a.href = u; a.download = "project-change-" + (activeUser || "backup") + ".json"; a.click(); URL.revokeObjectURL(u); toast("Exported!"); });
    $("sIm").addEventListener("click", function() { $("sIF").click(); });
    $("sIF").addEventListener("change", function(e) { var f = e.target.files[0]; if (!f) return; var r = new FileReader(); r.onload = function(ev) { try { D = Object.assign({}, DEF, JSON.parse(ev.target.result)); save(); location.reload(); } catch(er) { toast("Invalid file", "var(--red)"); } }; r.readAsText(f); });
    $("sR").addEventListener("click", function() {
      if (confirm("Reset ALL data for " + activeUser + "? This cannot be undone.")) {
        if (activeUser) {
          localStorage.removeItem(getUserKey(activeUser));
        } else {
          localStorage.removeItem(LEGACY_KEY);
        }
        location.reload();
      }
    });
  }

  // ── Boot ──────────────────────────────────────────────────────
  buildNav();
  $("uBtn").addEventListener("click", showProfileModal);

  if (activeUser) {
    $("nav").style.display = "";
    updateUserDisplay();
    updateStreak();
    render();
  } else {
    renderLogin();
  }

})();
</script>
</body>
</html>
